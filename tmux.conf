# Adletic tmux — branded multi-session layer.
# Loaded from ~/.config/adletic/welcome.sh via `tmux -f`.

# ============================================================
# Core behavior
# ============================================================

# Faster prefix response — terminal feels snappy.
set -sg escape-time 10

# Mouse on — click windows in status bar to switch, scroll to view scrollback.
set -g mouse on

# Wheel passthrough — when the focused pane is a TUI app that handles its own
# mouse (claude / yazi / micro / nvim / less / man / vim), forward wheel events
# to the app via `send-keys -M`. Otherwise enter copy-mode and scroll tmux's
# scrollback. Without these binds, claude code receives wheel-as-text and the
# scroll appears to "happen in the input field" instead of scrolling chat.
bind -n WheelUpPane \
  if-shell -F -t = "#{||:#{pane_in_mode},#{m/r:^(claude|yazi|micro|nvim|vim|less|man|fzf|node)$,#{pane_current_command}}}" \
    "send-keys -M" \
    "select-pane -t =; copy-mode -e; send-keys -M"
bind -n WheelDownPane \
  if-shell -F -t = "#{||:#{pane_in_mode},#{m/r:^(claude|yazi|micro|nvim|vim|less|man|fzf|node)$,#{pane_current_command}}}" \
    "send-keys -M" \
    "send-keys -M"

# Window title = workspace name + claude focus indicator + git status of cwd.
# macOS shows this in the Adletic title bar — quick glance tells you which
# workspace you're in, whether claude is the focused process, and the git state
# of the active pane's directory.
set -g set-titles on
# Claude check matches BOTH literal "claude" and the version-named process the
# claude binary reports as (e.g. "2.1.126") — without this, the top HUD is
# always in the "○ idle" state because pane_current_command is the version.
set -g set-titles-string "#S · #{?#{||:#{==:#{pane_current_command},claude},#{m/r:^[0-9]+\\.[0-9]+,#{pane_current_command}}},● claude,○ idle} · #(~/.config/adletic/helpers/git-status.sh #{pane_current_path})"

# True color + 256 color support (Claude Code uses 24-bit color).
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB"

# Window/pane numbering starts at 1 (⌘1 → first window matches).
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Long history per pane.
set -g history-limit 100000

# Use Ctrl-a as prefix (Ctrl-b conflicts with shell back-char).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config: Prefix + r
bind r source-file ~/.config/adletic/tmux.conf \; display " adletic tmux reloaded"

# Rename current session (Prefix + R) — updates BOTH the tmux session name
# and the adletic registry dir at ~/.aios/sessions/<name>/. Default tmux
# rename-session ($) only fixes tmux and silently leaves the registry stale,
# breaking inbox + statusbar. Use this instead.
bind R command-prompt -p "rename to:" "run-shell '/Users/firazfhansurie/.local/bin/adletic-rename-session %1'"

# Better split bindings (still accessible if Alacritty bindings break).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation: vim-style.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New window in current pane's directory.
bind c new-window -c "#{pane_current_path}"

# Prefix + f → file picker (fzf in a tmux popup). Selecting types @/abs/path
# into the active pane (i.e. into Claude's input).
# Also reachable via ⌘⇧F from Alacritty.
bind f display-popup -E -w 80% -h 75% \
  -d "#{pane_current_path}" \
  -e "TMUX_PANE_PATH=#{pane_current_path}" \
  "$HOME/.config/adletic/file-picker.sh"

# Prefix + o → link picker. Captures current pane's scrollback, finds every
# URL + file path, fzf-pick → opens. Bound to ⌘L from Alacritty.
bind o display-popup -E -w 80% -h 70% \
  -d "#{pane_current_path}" \
  -e "TMUX_CALLER_PANE=#{pane_id}" \
  "$HOME/.config/adletic/link-picker.sh"

# ⌘E → new-window → explorer (Yazi). Uses new-window not display-popup
# because yazi's terminal-capability probe (DA1/DA2) times out inside
# tmux popups — see https://yazi-rs.github.io/docs/faq#trt. Window
# auto-closes when yazi exits (remain-on-exit default = off).
bind -T prefix E new-window -c "#{pane_current_path}" \
  "$HOME/.config/adletic/modals/explorer.sh \"#{pane_current_path}\""

# ⌘J → display-popup → just-ask (Claude)
bind -T prefix J display-popup -E -w 60 -h 20 \
  '$HOME/.config/adletic/modals/just-ask.sh'

# ⌘I → display-popup → inbox (cross-session messages)
bind -T prefix I display-popup -E -w 80% -h 70% \
  '$HOME/.config/adletic/modals/inbox.sh'

# ⌘P → display-popup → palette (fuzzy launcher)
bind -T prefix P display-popup -E -w 60% -h 50% \
  '$HOME/.config/adletic/modals/palette.sh'

# ⌘/ → display-popup → cheatsheet
bind -T prefix / display-popup -E -w 80% -h 80% \
  '$HOME/.config/adletic/modals/cheatsheet.sh'

# ⌘O → display-popup → outbox (append-to-notes)
bind -T prefix O display-popup -E -w 50% -h 10% \
  '$HOME/.config/adletic/modals/outbox.sh'

# ============================================================
# Adletic palette — MotionBoards design system
# ============================================================
# --mb-orange:        #f26522
# --mb-dark-body:     #08131f
# --mb-dark-bg:       #0d1117
# --mb-dark-bg-2:     #161b22
# --mb-fg:            #ffffff
# --mb-fg-muted:      rgba(255,255,255,0.65) ≈ #a0a0a0
# --mb-fg-faint:      rgba(255,255,255,0.40) ≈ #666666

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set -g status-bg "#08131f"
set -g status-fg "#a0a0a0"

# Status left:  [adletic] session-name
set -g status-left-length 40
set -g status-left "#[fg=#08131f,bg=#f26522,bold]  adletic  #[fg=#f26522,bg=#0d1117]#[fg=#ffffff,bg=#0d1117,bold] #S #[fg=#0d1117,bg=#08131f] "

# Status right: scroll position (when in copy-mode) · HUD cost block · battery · date · time
# scroll_position is non-empty only while scrolled — perfect "you are here" cue.
# HUD chain: hud.sh (claude tokens/USD/MYR) │ battery │ date · clock
set -g status-right-length 200
set -g status-right "#{?#{!=:#{scroll_position},},#[fg=#fbbf24,bold]↑ #{scroll_position}/#{history_size} · ,}#[fg=#a0a0a0]#(~/.config/adletic/helpers/hud.sh '#{pane_current_path}') #[fg=#666666]│ #[fg=#a0a0a0]#(pmset -g batt 2>/dev/null | awk -F'\\t' 'NR==2{split($2,a,\";\"); gsub(/ /,\"\",a[1]); print a[1]}') %a %d · %H:%M "

# Second status row (status-format[1]): centered workspace activity dots from tracks.sh.
# Note: status-format[0] is the default-rendered row (status-left/center/right above).
set -g status 2
set -g status-format[1] "#[align=centre,bg=#08131f]#(~/.config/adletic/helpers/tracks.sh #S)"

# Window status (each window in the status bar)
# automatic-rename-format: tmux normally renames windows after the active
# pane's command name. The claude binary reports itself as its version
# (e.g. "2.1.126"), which is useless in the status bar — collapse anything
# that looks like a bare version to "claude".
set -g automatic-rename on
set -g automatic-rename-format "#{?#{m/r:^[0-9]+\\.[0-9]+,#{pane_current_command}},claude,#{pane_current_command}}"
set -g window-status-format "#[fg=#666666]  #I #W "
set -g window-status-current-format "#[fg=#08131f,bg=#f26522,bold] #I  #[fg=#f26522,bg=#161b22] #W #[fg=#161b22,bg=#08131f]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#161b22"
set -g pane-active-border-style "fg=#f26522"

# Message line (status feedback)
set -g message-style "fg=#08131f,bg=#f26522,bold"
set -g message-command-style "fg=#08131f,bg=#fbbf24,bold"

# Mode (copy mode / scroll) selection
setw -g mode-style "fg=#08131f,bg=#fbbf24"

# Activity / bell — subtle, not noisy
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# ============================================================
# Plugin manager (tpm) + persistence
# ============================================================
# tmux-resurrect — Prefix + Ctrl-S to save, Prefix + Ctrl-R to restore
# tmux-continuum — auto-saves every 15 min, auto-restores on tmux start
# Move tpm's install/update/clean off prefix-I/U/M-u so they don't shadow
# our modal binds. Reach them via prefix M-i / M-u / M-x instead.
set -g @tpm-install 'M-i'
set -g @tpm-update  'M-u'
set -g @tpm-clean   'M-x'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore on tmux start
set -g @continuum-restore 'on'
# Save every 15 min
set -g @continuum-save-interval '15'
# Resurrect captures pane contents (so scrollback is preserved)
set -g @resurrect-capture-pane-contents 'on'
# Resurrect: restore claude/zsh/python processes too (not just tmux structure)
set -g @resurrect-processes 'claude zsh node python "~node->node"'

# tpm install location (custom — we cloned to ~/.config/adletic/tmux-plugins)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/adletic/tmux-plugins/"

# Initialize tpm — must be at the bottom of the file
run -b "$HOME/.config/adletic/tmux-plugins/tpm/tpm"

# ============================================================
# Copy mode (vi-style; ⇧⌘Space-equivalent in Alacritty)
# ============================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================================
# Hooks — track session presence for `aios sessions`
# ============================================================
# Touch heartbeat on every prompt-back. Cheap.
set-hook -g session-created  'run-shell "/Users/firazfhansurie/.local/bin/adletic _heartbeat"'
set-hook -g window-pane-changed 'run-shell "/Users/firazfhansurie/.local/bin/adletic _heartbeat"'
set-hook -g client-attached  'run-shell "/Users/firazfhansurie/.local/bin/adletic _heartbeat"'
