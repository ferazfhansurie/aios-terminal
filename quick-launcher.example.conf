# Adletic quick-launcher bookmarks. Format: <label> | <shell command>
# Lines starting with # are comments. Blank lines ignored.
# Triggered by clicking the right side of the tmux status bar, or `prefix L`.
# Edit freely — picker re-reads the file each invocation.
#
# To use: copy this to quick-launcher.conf and edit. The .conf is gitignored
# so your personal links stay local.

# ── dashboards / external services
🌐 Anthropic console                   | open https://console.anthropic.com
🌐 Anthropic usage + billing           | open https://console.anthropic.com/settings/usage
🌐 claude.ai                           | open https://claude.ai
🌐 Vercel dashboard                    | open https://vercel.com/dashboard
🌐 GitHub                              | open https://github.com
🌐 Linear                              | open https://linear.app
🌐 Notion                              | open https://notion.so

# ── google
📧 Gmail                               | open https://mail.google.com
📅 Google Calendar                     | open https://calendar.google.com
📁 Google Drive                        | open https://drive.google.com

# ── local / introspection
📜 tail today's claude log              | tmux -L adletic split-window -v "find ~/.claude/projects -name '*.jsonl' -mtime -1 | xargs tail -F"
🔄 reload tmux config                  | tmux -L adletic source-file ~/.config/adletic/tmux.conf && tmux -L adletic display-message 'reloaded'
🧹 clear stt lock (if 🎤 stuck)        | rm -f /tmp/aios-stt.lock && tmux -L adletic refresh-client -S
🌡 refresh claude usage cache          | rm -f ~/.cache/adletic/claude-usage.txt && python3 ~/.config/adletic/helpers/claude-usage-fetch.py
