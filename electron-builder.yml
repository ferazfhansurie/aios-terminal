appId: com.adletic.aios
productName: AIOS
copyright: Copyright © 2025 Adletic

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - resources/**/*
  - package.json

extraResources:
  - from: template
    to: template
    filter:
      - "**/*"

asarUnpack:
  - "node_modules/@anthropic-ai/claude-code/**"

# Rebuild native modules (better-sqlite3) for the target platform
npmRebuild: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.productivity
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  title: AIOS
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  icon: resources/logo.png
  category: Development

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
