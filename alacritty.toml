# Adletic terminal ‚Äî base config
# MotionBoards design system + AIOS-optimized timeless features.
# Edit freely; reload = ‚åòN or restart (live_config_reload is on for most options).

# ========================================================================
# Window
# ========================================================================

[window]
padding = { x = 12, y = 12 }
dynamic_padding = true
decorations = "full"
opacity = 1.0
blur = false
title = "AIOS"
dynamic_title = true
option_as_alt = "Both"
startup_mode = "Windowed"

# ========================================================================
# Shell ‚Äî every new Adletic window boots into the welcome banner ‚Üí
# Claude Code. Set ADLETIC_SKIP_BOOT=1 in env to skip (e.g. ‚å•‚åòN below).
# ========================================================================

[terminal.shell]
program = "/Users/firazfhansurie/.config/adletic/welcome.sh"

# ========================================================================
# Font ‚Äî JetBrains Mono: free, ligature-aware, great box-drawing for
# Claude Code's TUI.
# ========================================================================

[font]
size = 13.0
builtin_box_drawing = true
normal      = { family = "JetBrains Mono", style = "Regular" }
bold        = { family = "JetBrains Mono", style = "Bold" }
italic      = { family = "JetBrains Mono", style = "Italic" }
bold_italic = { family = "JetBrains Mono", style = "Bold Italic" }

[font.offset]
y = 1

# ========================================================================
# Scrollback ‚Äî 100k lines, no truncation on long Claude conversations.
# ========================================================================

[scrolling]
history = 100000
multiplier = 3

# ========================================================================
# Cursor
# ========================================================================

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true
thickness = 0.18

# ========================================================================
# Selection / mouse
# ========================================================================

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

# ========================================================================
# Bell ‚Äî visual flash in brand orange (silent).
# ========================================================================

[bell]
animation = "EaseOutExpo"
duration = 100
color = "#f26522"

# ========================================================================
# Hints ‚Äî make Claude Code's URLs and file:line:col references clickable.
# Single-quoted = TOML literal string (no backslash escaping headaches).
#
#   ‚åò+click       ‚Üí open the link/path
#   ‚åÉ‚áßU           ‚Üí keyboard hint mode for URLs
#   ‚åÉ‚áßO           ‚Üí keyboard hint mode for file paths
# ========================================================================

[[hints.enabled]]
regex = '(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^ \t\n\r"`<>{}|^]+'
hyperlinks = true
command = "open"
post_processing = true
mouse = { enabled = true, mods = "Command|Shift" }
binding = { key = "U", mods = "Control|Shift" }

[[hints.enabled]]
# Match any of:
#   /abs/path/file.ext         ‚Üí absolute file path
#   ./relative.ext             ‚Üí relative path
#   ~/foo/bar.ext              ‚Üí home-relative path
#   src/components/Button.tsx  ‚Üí bare relative (no leading ./)
#   any of the above with :line or :line:col suffix
# Opens in Cursor.
regex = '(~/|\.{1,2}/|/)?[\w\-./]+\.[\w]+(:\d+(:\d+)?)?'
command = { program = "open", args = ["-a", "Visual Studio Code"] }
mouse = { enabled = true, mods = "Command|Shift" }
binding = { key = "O", mods = "Control|Shift" }

# ========================================================================
# Keybindings (additions on top of defaults).
# Defaults: ‚åòC copy, ‚åòV paste, ‚åòN new window, ‚åò+/‚åò- font, ‚åòF search,
# ‚åòQ quit, ‚áß‚åòSpace vi-mode toggle.
# ========================================================================

[[keyboard.bindings]]
# ‚áß‚Ü© ‚Äî Shift+Enter sends ESC+CR (Alt-Enter style). Claude Code's TUI
# treats this as "newline within input" instead of "submit". Works with
# most readline-based prompts too.
key = "Return"
mods = "Shift"
chars = "\u001b\r"

[[keyboard.bindings]]
# ‚åòK ‚Äî clear scrollback (parity with iTerm2 / Terminal.app).
key = "K"
mods = "Command"
action = "ClearHistory"

[[keyboard.bindings]]
# ‚åòL ‚Äî link picker. Captures URLs + file paths from current pane scrollback,
# fzf-picks, opens (URL ‚Üí browser, file ‚Üí VSCode).
key = "L"
mods = "Command"
chars = "\u0001o"

[[keyboard.bindings]]
# ‚áß‚åòA ‚Äî new Adletic window cd'd into your AIOS workspace.
key = "A"
mods = "Command|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
# ‚å•‚åòN ‚Äî raw shell window (skip the boot banner / Claude auto-launch).
# Useful when you just want zsh.
key = "N"
mods = "Command|Alt"
command = { program = "/Applications/Adletic.app/Contents/MacOS/adletic", args = ["-e", "/bin/zsh", "-l"] }

[[keyboard.bindings]]
# ‚åÉ‚áßF / ‚åÉ‚áßB ‚Äî fast scrollback search.
key = "F"
mods = "Control|Shift"
action = "SearchForward"

[[keyboard.bindings]]
key = "B"
mods = "Control|Shift"
action = "SearchBackward"

# ========================================================================
# tmux bindings ‚Äî translate macOS shortcuts ‚Üí tmux prefix sequences.
# Prefix is Ctrl-A (^A). Lets you live in tmux without learning prefixes.
# ========================================================================

# ‚åòT ‚Äî new tmux window
[[keyboard.bindings]]
key = "T"
mods = "Command"
chars = "\u0001c"

# ‚åò[ / ‚åò] ‚Äî prev / next window
[[keyboard.bindings]]
key = "LBracket"
mods = "Command"
chars = "\u0001p"

[[keyboard.bindings]]
key = "RBracket"
mods = "Command"
chars = "\u0001n"

# ‚åò1 .. ‚åò9 ‚Äî jump to window N
[[keyboard.bindings]]
key = "Key1"
mods = "Command"
chars = "\u00011"

[[keyboard.bindings]]
key = "Key2"
mods = "Command"
chars = "\u00012"

[[keyboard.bindings]]
key = "Key3"
mods = "Command"
chars = "\u00013"

[[keyboard.bindings]]
key = "Key4"
mods = "Command"
chars = "\u00014"

[[keyboard.bindings]]
key = "Key5"
mods = "Command"
chars = "\u00015"

[[keyboard.bindings]]
key = "Key6"
mods = "Command"
chars = "\u00016"

[[keyboard.bindings]]
key = "Key7"
mods = "Command"
chars = "\u00017"

[[keyboard.bindings]]
key = "Key8"
mods = "Command"
chars = "\u00018"

[[keyboard.bindings]]
key = "Key9"
mods = "Command"
chars = "\u00019"

# ‚åòD ‚Äî split pane vertically (side-by-side)
[[keyboard.bindings]]
key = "D"
mods = "Command"
chars = "\u0001|"

# ‚åò‚áßD ‚Äî split pane horizontally (top/bottom)
[[keyboard.bindings]]
key = "D"
mods = "Command|Shift"
chars = "\u0001-"

# ‚åòW ‚Äî close current pane (NOT the whole window ‚Äî that's ‚åòQ)
[[keyboard.bindings]]
key = "W"
mods = "Command"
chars = "\u0001x"

# ========================================================================
# Spawn working directory for ‚áß‚åòA ‚Äî point at your main AIOS workspace.
# ========================================================================


# ‚åò‚áßF ‚Äî fzf file picker. Sends Prefix+f (Ctrl-A then f) to tmux, popup
# opens, pick a file, "@/abs/path" gets typed into the active prompt.
[[keyboard.bindings]]
key = "F"
mods = "Command|Shift"
chars = "\u0001f"


# ‚åòR ‚Äî rename current tmux window. Sends Prefix+, ‚Üí tmux opens a name prompt.
[[keyboard.bindings]]
key = "R"
mods = "Command"
chars = "\u0001,"

# ‚åò‚áßR ‚Äî rename current tmux SESSION via the custom adletic-rename-session
# helper (updates BOTH tmux session name AND ~/.aios/sessions/<name>/ dir).
# Sends Prefix+R (Ctrl+A then Shift+R) which invokes `bind R` in tmux.conf.
[[keyboard.bindings]]
key = "R"
mods = "Command|Shift"
chars = "\u0001R"

# ‚åòE ‚Äî Explorer (Yazi popup)
[[keyboard.bindings]]
key = "E"
mods = "Command"
chars = "\u0001E"  # tmux prefix Ctrl-A then capital E (bound in tmux.conf)

# ‚åòI ‚Äî Inbox (cross-session messages)
[[keyboard.bindings]]
key = "I"
mods = "Command"
chars = "\u0001I"  # bound in tmux.conf

# ‚åòP ‚Äî Palette (fuzzy launcher)
[[keyboard.bindings]]
key = "P"
mods = "Command"
chars = "\u0001P"  # bound in tmux.conf

# ‚åò/ ‚Äî Cheatsheet
[[keyboard.bindings]]
key = "Slash"
mods = "Command"
chars = "\u0001/"  # bound in tmux.conf

# ‚åòJ ‚Äî Just-ask (claude popup)
[[keyboard.bindings]]
key = "J"
mods = "Command"
chars = "\u0001J"  # bound in tmux.conf

[general]
working_directory = "/Users/firazfhansurie/Repo/firaz/adletic/aios-firaz"
live_config_reload = true

